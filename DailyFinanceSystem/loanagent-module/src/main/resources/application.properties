
# ===============================
# SERVER CONFIGURATION
# ===============================

server.port=8084
spring.application.name=loan-service


# ===============================
# DATABASE CONFIGURATION
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/loandb
spring.datasource.username=postgres
spring.datasource.password=srinu
spring.datasource.driver-class-name=org.postgresql.Driver


# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


# ===============================
# LOGGING (OPTIONAL BUT USEFUL)
# ===============================

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# ===============================
# EXTERNAL MICROSERVICE URLS
# ===============================
customer.service.url=http://customer-service
plan.service.url=http://plan-service
fund.service.url=http://fund-service


# ===============================
# CONNECTION POOL (OPTIONAL)
# ===============================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000


# ===============================
# JACKSON CONFIGURATION
# ===============================

#spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false
spring.jackson.time-zone=UTC

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s

spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.service-name=loan-service

spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500


spring.cloud.consul.discovery.hostname=localhost
spring.cloud.consul.discovery.prefer-ip-address=false